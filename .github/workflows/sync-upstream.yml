name: Sync upstream

on:
  workflow_call:
    inputs:
      upstream_version:
        description: "Upstream version tag to fetch (e.g. v1.0.10)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "Upstream version tag to fetch (e.g. v1.0.10)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: coatsy/vscode-extension
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch upstream content
        run: |
          VERSION="${{ inputs.upstream_version }}"
          echo "Fetching upstream content for $VERSION..."
          bash scripts/fetch-upstream.sh --version "$VERSION"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — local content already matches upstream ${{ inputs.upstream_version }}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            CHANGED=$(git diff --stat | tail -1)
            echo "Changes detected: $CHANGED"
          fi

      - name: Create sync branch and PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.upstream_version }}"
          TODAY=$(date -u +%Y%m%d)
          BRANCH="chore/sync-upstream-${VERSION}-${TODAY}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync upstream content from $VERSION"
          git push origin "$BRANCH"

          PR_BODY="Automated content sync from upstream microsoft/skills-for-copilot-studio.

          **Upstream release**: [$VERSION](https://github.com/microsoft/skills-for-copilot-studio/releases/tag/$VERSION)

          ### Content synced
          $(git diff --stat HEAD~1)

          ---
          *This PR was created automatically by the sync-upstream workflow.*"

          # Use REST API to avoid GraphQL SAML enforcement on fork parent
          jq -n \
            --arg title "chore: sync upstream content from $VERSION" \
            --arg body "$PR_BODY" \
            --arg head "$BRANCH" \
            '{"title": $title, "body": $body, "head": $head, "base": "coatsy/vscode-extension", "draft": true}' \
            | curl -sf \
              -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls" \
              -d @-

          echo "Created sync PR for $VERSION"
